services:
  - type: web
    name: precision-prints-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/backend/data
